{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">我的收藏夾</h2>
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for recipe in recipes %}
    <div class="col">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">{{ recipe.title }}</h5>
                <p class="card-text text-muted small">{{ recipe.description }}</p>
                <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-sm btn-outline-danger">查看</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <p class="text-muted">您還沒有收藏任何食譜喔。</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
