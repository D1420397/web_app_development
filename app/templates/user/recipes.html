{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2 class="fw-bold">我的發佈食譜</h2>
        <p class="text-muted">這裡記錄了您分享的所有美味秘訣。</p>
    </div>
    <div class="col-auto">
        <a href="{{ url_for('recipe.create') }}" class="btn btn-primary">發佈新食譜</a>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for recipe in recipes %}
    <div class="col">
        <div class="card h-100">
            {% if recipe.image_path %}
                <img src="{{ recipe.image_path }}" class="card-img-top" alt="{{ recipe.title }}">
            {% else %}
                <div class="bg-light text-center py-5">
                    <span class="display-4">🥣</span>
                </div>
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ recipe.title }}</h5>
                <p class="card-text text-muted small text-truncate">{{ recipe.description }}</p>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-sm btn-outline-danger">查看</a>
                    <a href="{{ url_for('recipe.edit', id=recipe.id) }}" class="btn btn-sm btn-link text-secondary">編輯</a>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <div class="mb-3">
            <span class="display-1 text-light">📝</span>
        </div>
        <p class="text-muted">您還沒有發佈過食譜喔，快來分享您的第一道菜吧！</p>
        <a href="{{ url_for('recipe.create') }}" class="btn btn-danger mt-2">立即發佈</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
