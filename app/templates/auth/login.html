{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0">
            <div class="text-center mb-4">
                <h2 class="fw-bold">歡迎回來！</h2>
                <p class="text-muted">立即登入，繼續您的料理之路</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email 地址</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">密碼</label>
                    <input type="password" name="password" class="form-control" placeholder="輸入密碼" required>
                </div>
                
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" name="remember" id="rememberCheck">
                    <label class="form-check-label" for="rememberCheck">
                        記住我
                    </label>
                </div>
                
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">登入</button>
                </div>
                
                <p class="text-center small text-muted">
                    還沒有帳號？ <a href="{{ url_for('auth.register') }}" class="text-danger fw-bold">立即加入</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
