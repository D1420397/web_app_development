{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0">
            <div class="text-center mb-4">
                <h2 class="fw-bold">建立新內容</h2>
                <p class="text-muted">加入社群，開始分享您的美味食譜</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">使用者名稱</label>
                    <input type="text" name="username" class="form-control" placeholder="輸入暱稱" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email 地址</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">密碼</label>
                    <input type="password" name="password" class="form-control" placeholder="至少 6 位字元" required>
                </div>
                
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">註冊</button>
                </div>
                
                <p class="text-center small text-muted">
                    已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-danger fw-bold">立即登入</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
