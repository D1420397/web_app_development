{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="text-center mb-5">
            <h1 class="fw-bold">食材組合搜尋</h1>
            <p class="text-muted">勾選您目前現有的食材，我們將為您推薦合適的料理。</p>
        </div>

        <form action="{{ url_for('recipe.search') }}" method="POST" class="card p-4">
            <h5 class="mb-3">選擇食材：</h5>
            <div class="row row-cols-2 row-cols-md-4 g-3 mb-4">
                {% for ing in ingredients %}
                <div class="col">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="ingredients" value="{{ ing.id }}" id="ing_{{ ing.id }}">
                        <label class="form-check-label" for="ing_{{ ing.id }}">
                            {{ ing.name }}
                        </label>
                    </div>
                </div>
                {% else %}
                <p class="text-muted small">暫無食材資料，請先前往新增食譜建立食材。</p>
                {% endfor %}
            </div>
            
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">立即搜尋</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
